name: 功能建议
description: 提出一个新功能、改进建议或体验优化想法
title: "[Feature] "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。为了方便评估，请尽量从“要解决什么问题”出发，而不是只描述一个功能名。
  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue / Discussions，确认这不是重复建议
          required: true
        - label: 我理解该项目当前主要由维护者个人维护，功能会按优先级评估
          required: true
        - label: 如果方案清晰，我愿意协助补充细节或提交 PR
          required: false
  - type: textarea
    id: problem
    attributes:
      label: 你希望解决的问题
      description: 先说问题场景，再说方案。
      placeholder: |
        例如：
        当前播放器缺少 xxx，导致用户在 xxx 场景下很难完成 xxx。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你建议的解决方案
      description: 请说明你理想中的交互、行为或技术方向。
      placeholder: |
        例如：
        增加一个 xxx 开关，默认行为为 xxx，在移动端表现为 xxx。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 可选。说明你为什么更倾向当前方案。
      placeholder: 例如：也可以通过 xxx 实现，但它的问题是 ...
  - type: dropdown
    id: impact
    attributes:
      label: 你认为受影响的范围
      options:
        - 新用户首次体验
        - 日常播放器使用
        - 部署 / 维护体验
        - SEO / 内容可见性
        - 开发者扩展能力
        - 其他
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 参考资料或示例
      description: 可选。可以贴其他产品、设计图、伪代码、录屏等。
      placeholder: 相关链接、截图、草图或说明
