name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.json
      - .github/workflows/sync-labels.yml
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync-labels:
    name: Sync repository labels
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync labels from config
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const labels = JSON.parse(fs.readFileSync(".github/labels.json", "utf8"));

            const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const existingMap = new Map(existingLabels.map(label => [label.name, label]));

            for (const label of labels) {
              const current = existingMap.get(label.name);

              if (!current) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Created label: ${label.name}`);
                continue;
              }

              if (current.color !== label.color || (current.description || "") !== (label.description || "")) {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: current.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Updated label: ${label.name}`);
              }
            }

            core.info(`Synced ${labels.length} labels.`);
