name: 部署 / 环境问题
description: 安装、构建、部署、环境变量或运行时配置相关问题
title: "[Deployment] "
labels:
  - deployment
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        这个模板用于：
        - 安装依赖失败
        - 本地构建失败
        - Vercel / Netlify / 自托管部署异常
        - 环境变量、运行时或平台兼容问题
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已阅读 README 中的部署说明
          required: true
        - label: 我已搜索现有 Issue / Discussions，确认这不是重复问题
          required: true
        - label: 我已移除日志中的密钥、Token、Cookie 等敏感信息
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: 部署平台
      options:
        - 本地开发环境
        - Vercel
        - Netlify
        - Cloudflare Pages
        - Docker / 自托管
        - 其他
    validations:
      required: true
  - type: input
    id: public-url
    attributes:
      label: 部署地址
      description: 如站点可公开访问，请提供 URL；否则可留空。
      placeholder: https://example.com
  - type: input
    id: node-version
    attributes:
      label: Node.js 版本
      placeholder: 20.18.0
  - type: input
    id: package-manager
    attributes:
      label: 包管理器与版本
      placeholder: npm 10 / pnpm 9 / yarn 4
  - type: textarea
    id: description
    attributes:
      label: 遇到的问题
      description: 说明报错发生在哪个阶段，例如安装、构建、启动、请求运行时等。
      placeholder: |
        例如：
        - `npm install` 正常
        - `npm run build` 在 xxx 步骤失败
        - 线上访问 `/api/...` 返回 500
    validations:
      required: true
  - type: textarea
    id: env-check
    attributes:
      label: 你已经检查过的配置
      description: 例如环境变量、平台运行时、构建命令、Node 版本、Region 等。
      placeholder: |
        例如：
        - 已确认平台 Node 版本 >= 20.9
        - 已配置 xxx 环境变量
        - 已按 README 使用 `npm run build`
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 构建日志 / 错误日志
      render: shell
      placeholder: 粘贴最关键的日志片段；请不要包含敏感信息。
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 其他补充信息
      description: 可补充截图、录屏、平台面板信息、复现仓库等。
